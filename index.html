<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세미나 포스터 템플릿</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background: #f0f0f5;
            min-height: 100vh;
        }

        .app {
            display: flex;
            min-height: 100vh;
        }

        /* ── 왼쪽 편집 패널 ── */
        .editor {
            width: 340px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .editor-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid #e5e7eb;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .editor-header h2 {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .editor-header p {
            font-size: 11px;
            color: #6b7280;
        }

        .editor-body {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .field-group h3 {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #303090;
            margin-bottom: 10px;
        }

        .field {
            margin-bottom: 10px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 4px;
        }

        .field input,
        .field textarea {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 12px;
            color: #1a1a2e;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            resize: none;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: #2d2de0;
        }

        /* 프로그램 행 */
        .program-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .program-row {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px;
        }

        .program-row-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .row-num {
            width: 20px;
            height: 20px;
            background: #2d2de0;
            color: #fff;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .program-row-header span {
            font-size: 11px;
            font-weight: 600;
            color: #374151;
            flex: 1;
        }

        .btn-del-row {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 15px;
            line-height: 1;
            padding: 0 2px;
            transition: color 0.15s;
        }

        .btn-del-row:hover {
            color: #ef4444;
        }

        .program-row input {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 5px;
            padding: 5px 8px;
            font-size: 11px;
            font-family: inherit;
            outline: none;
            background: #fff;
            margin-bottom: 5px;
        }

        .program-row input:last-child {
            margin-bottom: 0;
        }

        .program-row input:focus {
            border-color: #2d2de0;
        }

        .program-row input::placeholder {
            color: #9ca3af;
        }

        /* 추가 버튼 */
        .btn-add-row {
            width: 100%;
            background: #f0f0ff;
            border: 1.5px dashed #a0a0e0;
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            font-weight: 500;
            color: #2d2de0;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }

        .btn-add-row:hover {
            background: #e0e0fa;
        }

        /* 하단 버튼 */
        .editor-footer {
            padding: 14px 20px;
            border-top: 1px solid #e5e7eb;
            background: #fff;
            position: sticky;
            bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .btn-generate {
            width: 100%;
            background: #2d2de0;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-generate:hover {
            background: #1a1adc;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }

        .btn-sub {
            background: #f5f6fa;
            color: #1a1a2e;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 9px 4px;
            font-size: 11px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .btn-sub:hover {
            background: #e8e8f5;
            border-color: #c0c0e0;
        }

        .btn-sub .icon {
            font-size: 15px;
        }

        .btn-sub .label {
            font-size: 10px;
            color: #6b7280;
        }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── 미리보기 ── */
        .preview {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 32px;
            overflow-y: auto;
        }

        /* ── 포스터 ── */
        .poster {
            width: 480px;
            background: #f5f6fa;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
            flex-shrink: 0;
        }

        .poster-header {
            background: linear-gradient(135deg, #1a1adc 0%, #4444ee 100%);
            padding: 28px 28px 24px;
            position: relative;
            overflow: hidden;
        }

        .poster-header::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            pointer-events: none;
        }

        .poster-header::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .p-org-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.95);
            font-size: 11px;
            font-weight: 500;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .p-event-label {
            font-size: 9.5px;
            letter-spacing: 3px;
            color: #a0a0ff;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .p-main-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            line-height: 1.25;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
            white-space: pre-line;
        }

        .p-subtitle {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.12);
            border-left: 3px solid rgba(255, 255, 255, 0.6);
            padding: 6px 10px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            display: inline-block;
        }

        .p-info-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            z-index: 1;
        }

        .p-info-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .p-info-label {
            font-size: 10px;
            font-weight: 600;
            color: #a0a0ff;
            min-width: 28px;
            padding-top: 1px;
            flex-shrink: 0;
        }

        .p-info-value {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.5;
        }

        .p-divider {
            height: 1px;
            background: linear-gradient(to right, #2d2de0, transparent);
            opacity: 0.25;
            margin: 0 28px;
        }

        .p-program-section {
            padding: 20px 28px 28px;
        }

        .p-section-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: #2d2de0;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .p-section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .p-table {
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .p-table-header {
            display: grid;
            grid-template-columns: 38px 1fr 90px;
            background: #2d2de0;
            padding: 8px 0;
        }

        .p-table-header span {
            font-size: 10px;
            font-weight: 500;
            color: #fff;
            text-align: center;
        }

        .p-table-header span:nth-child(2) {
            text-align: left;
            padding-left: 10px;
        }

        .p-table-body .p-row {
            display: grid;
            grid-template-columns: 38px 1fr 90px;
            border-top: 1px solid #e5e7eb;
            min-height: 48px;
            align-items: center;
        }

        .p-table-body .p-row:nth-child(odd) {
            background: #f9fafb;
        }

        .p-table-body .p-row:nth-child(even) {
            background: #fff;
        }

        .p-table-body .p-row:first-child {
            background: #eeeeff;
            border-left: 3px solid #2d2de0;
        }

        .p-row-no {
            font-size: 12px;
            font-weight: 700;
            color: #2d2de0;
            text-align: center;
        }

        .p-row-content {
            padding: 8px 10px;
            border-left: 1px solid #e5e7eb;
            border-right: 1px solid #e5e7eb;
        }

        .p-row-content strong {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .p-row-content span {
            font-size: 9.5px;
            color: #6b7280;
        }

        .p-row-speaker {
            padding: 0 8px;
            text-align: center;
        }

        .p-row-speaker strong {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .p-row-speaker span {
            font-size: 9px;
            color: #6b7280;
        }

        @media print {
            .editor {
                display: none;
            }

            .preview {
                padding: 0;
            }

            .poster {
                box-shadow: none;
                border-radius: 0;
            }

            body {
                background: white;
            }
        }
    </style>
</head>

<body>
    <div class="app">

        <div class="editor">
            <div class="editor-header">
                <h2>포스터 내용 편집</h2>
                <p>수정 후 포스터 생성 버튼을 눌러주세요</p>
            </div>
            <div class="editor-body">

                <div class="field-group">
                    <h3>기본 정보</h3>
                    <div class="field">
                        <label>주최 기관명</label>
                        <input type="text" id="org" value="소부장기술융합포럼">
                    </div>
                    <div class="field">
                        <label>이벤트 레이블 (영문)</label>
                        <input type="text" id="eventLabel" value="2026 MONTHLY SEMINAR">
                    </div>
                    <div class="field">
                        <label>메인 타이틀</label>
                        <textarea id="mainTitle" rows="2">2026년 4월
월간세미나</textarea>
                    </div>
                    <div class="field">
                        <label>부제목 / 주제</label>
                        <input type="text" id="subtitle" value="최근 반도체 관련 소부장 기업 이슈">
                    </div>
                </div>

                <div class="field-group">
                    <h3>일시 · 장소</h3>
                    <div class="field">
                        <label>일시</label>
                        <input type="text" id="date" value="2026년 4월 13일(월) 오후 5시">
                    </div>
                    <div class="field">
                        <label>장소</label>
                        <input type="text" id="venue" value="티로보틱스 (경기도 오산시 가장산업서북로 103-37)">
                    </div>
                </div>

                <div class="field-group">
                    <h3>프로그램</h3>
                    <div class="program-rows" id="programRows"></div>
                    <button class="btn-add-row" onclick="addRow()">+ 프로그램 추가</button>
                </div>

            </div>
            <div class="editor-footer">
                <button class="btn-generate" onclick="generate()">▶ 포스터 생성</button>
                <div class="btn-row">
                    <button class="btn-sub" onclick="saveImage()">
                        <span class="icon">🖼</span>
                        <span class="label">이미지 저장</span>
                    </button>
                    <button class="btn-sub" onclick="copyImage()">
                        <span class="icon">📋</span>
                        <span class="label">클립보드 복사</span>
                    </button>
                    <button class="btn-sub" onclick="window.print()">
                        <span class="icon">🖨</span>
                        <span class="label">인쇄/PDF</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="preview">
            <div class="poster" id="poster"></div>
        </div>

    </div>
    <div class="toast" id="toast"></div>

    <script>
        let programs = [
            { content: '소부장기술융합포럼 / 연구조합 총회', sub: '정기총회 진행', speaker: '', role: '' },
            { content: '반도체 후공정 설비 동향 및 전망', sub: 'Semiconductor back-end process equipment trend', speaker: '최용원', role: '부사장' },
            { content: '특허 소송 사례 설명', sub: 'Patent litigation case review', speaker: '김철진 변리사', role: '윌비에스엔티' },
            { content: '서버 해킹 보안 대책', sub: 'Server hacking security countermeasures', speaker: '박춘식', role: '보안안전 전문가' },
            { content: '공장 견학', sub: '티로보틱스 시설 투어', speaker: '', role: '' },
        ];

        function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

        function buildForm() {
            const wrap = document.getElementById('programRows');
            wrap.innerHTML = '';
            programs.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'program-row';
                div.innerHTML = `
        <div class="program-row-header">
          <div class="row-num">${i + 1}</div>
          <span>프로그램 ${i + 1}</span>
          <button class="btn-del-row" onclick="deleteRow(${i})" title="삭제">✕</button>
        </div>
        <input type="text" id="p${i}_content" placeholder="내용 *"           value="${esc(p.content)}">
        <input type="text" id="p${i}_sub"     placeholder="부가 설명 (선택)" value="${esc(p.sub)}">
        <input type="text" id="p${i}_speaker" placeholder="발표자 (선택)"   value="${esc(p.speaker)}">
        <input type="text" id="p${i}_role"    placeholder="소속/직함 (선택)" value="${esc(p.role)}">
      `;
                wrap.appendChild(div);
            });
        }

        function addRow() {
            programs = collectPrograms(); // 현재 입력된 내용들을 먼저 저장 (중복 유실 방지)
            programs.push({ content: '', sub: '', speaker: '', role: '' });
            buildForm();
            // 새 행으로 스크롤
            setTimeout(() => {
                const rows = document.querySelectorAll('.program-row');
                if (rows.length > 0) {
                    rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 10);
        }

        function deleteRow(i) {
            if (programs.length <= 1) { showToast('최소 1개 이상 필요합니다'); return; }
            programs = collectPrograms(); // 현재 입력된 내용들을 저장
            programs.splice(i, 1);
            buildForm();
        }

        function collectPrograms() {
            return programs.map((_, i) => ({
                content: document.getElementById(`p${i}_content`)?.value.trim() || '',
                sub: document.getElementById(`p${i}_sub`)?.value.trim() || '',
                speaker: document.getElementById(`p${i}_speaker`)?.value.trim() || '',
                role: document.getElementById(`p${i}_role`)?.value.trim() || '',
            }));
        }

        function generate() {
            const org = document.getElementById('org').value;
            const eventLabel = document.getElementById('eventLabel').value;
            const mainTitle = document.getElementById('mainTitle').value;
            const subtitle = document.getElementById('subtitle').value;
            const date = document.getElementById('date').value;
            const venue = document.getElementById('venue').value;

            let rowsHTML = '';
            let no = 1;
            collectPrograms().forEach(p => {
                if (!p.content) return;
                rowsHTML += `
        <div class="p-row">
          <div class="p-row-no">${no++}</div>
          <div class="p-row-content">
            <strong>${p.content}</strong>
            ${p.sub ? `<span>${p.sub}</span>` : ''}
          </div>
          <div class="p-row-speaker">
            ${p.speaker ? `<strong>${p.speaker}</strong>` : ''}
            ${p.role ? `<span>${p.role}</span>` : (!p.speaker ? '<span>—</span>' : '')}
          </div>
        </div>`;
            });

            document.getElementById('poster').innerHTML = `
      <div class="poster-header">
        <div class="p-org-tag">${org}</div>
        <div class="p-event-label">${eventLabel}</div>
        <div class="p-main-title">${mainTitle}</div>
        <div class="p-subtitle">${subtitle}</div>
        <div class="p-info-row">
          <div class="p-info-item"><span class="p-info-label">일시</span><span class="p-info-value">${date}</span></div>
          <div class="p-info-item"><span class="p-info-label">장소</span><span class="p-info-value">${venue}</span></div>
        </div>
      </div>
      <div class="p-divider"></div>
      <div class="p-program-section">
        <div class="p-section-label">PROGRAM</div>
        <div class="p-section-title">세부 프로그램</div>
        <div class="p-table">
          <div class="p-table-header"><span>No</span><span>내용</span><span>발표자</span></div>
          <div class="p-table-body">${rowsHTML}</div>
        </div>
      </div>`;

            showToast('포스터가 생성되었습니다 ✓');
        }

        /* ── Canvas 직접 렌더링 ── */
        function buildCanvas() {
            const S = 2; // 해상도 배율
            const W = 480, PAD = 28;
            const font = "'Apple SD Gothic Neo','Noto Sans KR',sans-serif";

            const org = document.getElementById('org').value;
            const eventLabel = document.getElementById('eventLabel').value;
            const mainTitle = document.getElementById('mainTitle').value;
            const subtitle = document.getElementById('subtitle').value;
            const date = document.getElementById('date').value;
            const venue = document.getElementById('venue').value;
            const rows = collectPrograms().filter(p => p.content);

            // 가상 캔버스로 높이 시뮬레이션
            const cv_dummy = document.createElement('canvas');
            const c_dummy = cv_dummy.getContext('2d');
            const h_font = font;

            // 1. 헤더 높이 계산 (실제 드로잉 로직과 동일하게 추적)
            let currY = PAD;
            currY += 34; // org 태그 영역
            currY += 18; // eventLabel
            const titleLines = mainTitle.split('\n');
            currY += titleLines.length * 34 + 2; // 메인 타이틀
            currY += 36; // 부제목 강조 박스
            currY += 18 * 2; // 일시, 장소 (2줄)

            const headerH = currY + 18; // 헤더 하단 여백 추가
            const dividerH = 1;
            const sectionH = 56;          // PROGRAM 레이블 + 제목 영역
            const tableHdrH = 30;
            const rowH = 48;
            const bottomPad = 28;
            const H = headerH + dividerH + sectionH + tableHdrH + rows.length * rowH + bottomPad;

            const cv = document.createElement('canvas');
            cv.width = W * S;
            cv.height = H * S;
            const c = cv.getContext('2d');
            c.scale(S, S);

            /* ── 헤더 배경 그라디언트 ── */
            const hg = c.createLinearGradient(0, 0, W, headerH);
            hg.addColorStop(0, '#1a1adc');
            hg.addColorStop(1, '#4444ee');
            c.fillStyle = hg;
            c.fillRect(0, 0, W, headerH);

            /* 장식 원 */
            function circle(cx, cy, r, alpha) {
                c.save();
                c.globalAlpha = alpha;
                c.fillStyle = '#fff';
                c.beginPath(); c.arc(cx, cy, r, 0, Math.PI * 2); c.fill();
                c.restore();
            }
            circle(W - 40, -40, 90, 0.04);
            circle(60, headerH - 20, 60, 0.05);

            let y = PAD;

            /* 기관 태그 pill */
            c.font = `500 11px ${font}`;
            const orgW = c.measureText(org).width + 28;
            c.fillStyle = 'rgba(255,255,255,0.15)';
            roundRect(c, PAD, y, orgW, 22, 11);
            c.fillStyle = 'rgba(255,255,255,0.95)';
            c.textBaseline = 'middle';
            c.textAlign = 'left';
            c.fillText(org, PAD + 14, y + 11);
            y += 34;

            /* 이벤트 레이블 */
            c.font = `400 9.5px ${font}`;
            c.fillStyle = '#a0a0ff';
            c.letterSpacing = '3px';
            c.fillText(eventLabel, PAD, y);
            c.letterSpacing = '0px';
            y += 18;

            /* 메인 타이틀 */
            c.font = `700 28px ${font}`;
            c.fillStyle = '#fff';
            const lines = mainTitle.split('\n');
            lines.forEach(line => { c.fillText(line, PAD, y); y += 34; });
            y += 2;

            /* 부제목 강조 박스 */
            c.font = `600 13px ${font}`;
            const subW = Math.min(c.measureText(subtitle).width + 20, W - PAD * 2);
            c.fillStyle = 'rgba(255,255,255,0.12)';
            c.fillRect(PAD, y, subW, 26);
            c.fillStyle = 'rgba(255,255,255,0.7)';
            c.fillRect(PAD, y, 3, 26);
            c.fillStyle = '#fff';
            c.fillText(subtitle, PAD + 10, y + 13);
            y += 36;

            /* 일시·장소 */
            function infoLine(label, val) {
                c.font = `600 10px ${font}`;
                c.fillStyle = '#a0a0ff';
                c.fillText(label, PAD, y + 1);
                c.font = `500 11.5px ${font}`;
                c.fillStyle = 'rgba(255,255,255,0.92)';
                c.fillText(val, PAD + 32, y + 1);
                y += 18;
            }
            infoLine('일시', date);
            infoLine('장소', venue);

            /* ── 본문 배경 ── */
            c.fillStyle = '#f5f6fa';
            c.fillRect(0, headerH, W, H - headerH);

            /* 구분선 */
            const dg = c.createLinearGradient(PAD, 0, W - PAD, 0);
            dg.addColorStop(0, 'rgba(45,45,224,0.3)');
            dg.addColorStop(1, 'rgba(45,45,224,0)');
            c.fillStyle = dg;
            c.fillRect(PAD, headerH, W - PAD * 2, 1);

            /* PROGRAM 레이블 */
            y = headerH + 20;
            c.font = `500 9px ${font}`;
            c.fillStyle = '#2d2de0';
            c.fillText('PROGRAM', PAD, y);
            y += 16;

            /* 섹션 타이틀 */
            c.font = `700 16px ${font}`;
            c.fillStyle = '#1a1a2e';
            c.fillText('세부 프로그램', PAD, y);
            y += 20;

            /* 테이블 헤더 */
            c.fillStyle = '#2d2de0';
            c.fillRect(PAD, y, W - PAD * 2, tableHdrH);
            c.font = `500 10px ${font}`;
            c.fillStyle = '#fff';
            c.textAlign = 'center';
            c.fillText('No', PAD + 19, y + 15);
            c.textAlign = 'left';
            c.fillText('내용', PAD + 48, y + 15);
            c.textAlign = 'center';
            c.fillText('발표자', W - PAD - 45, y + 15);
            y += tableHdrH;

            /* 테이블 행 */
            const COL1 = 38, COL3 = 90;
            const contentX = PAD + COL1, speakerX = W - PAD - COL3;
            rows.forEach((p, i) => {
                const bg = i === 0 ? '#eeeeff' : (i % 2 === 0 ? '#ffffff' : '#f9fafb');
                c.fillStyle = bg;
                c.fillRect(PAD, y, W - PAD * 2, rowH);

                /* 첫 행 파란 왼쪽 선 */
                if (i === 0) { c.fillStyle = '#2d2de0'; c.fillRect(PAD, y, 3, rowH); }

                /* 구분선 */
                c.fillStyle = '#e5e7eb';
                c.fillRect(PAD, y, W - PAD * 2, 1);
                c.fillRect(contentX, y, 1, rowH);
                c.fillRect(speakerX, y, 1, rowH);

                /* No */
                c.font = `700 12px ${font}`;
                c.fillStyle = '#2d2de0';
                c.textAlign = 'center';
                c.fillText(i + 1, PAD + COL1 / 2, y + (p.sub ? 22 : 28));

                /* 내용 */
                c.font = `600 11px ${font}`;
                c.fillStyle = '#1a1a2e';
                c.textAlign = 'left';
                c.fillText(p.content, contentX + 10, y + (p.sub ? 18 : 28));
                if (p.sub) {
                    c.font = `400 9px ${font}`;
                    c.fillStyle = '#6b7280';
                    c.fillText(p.sub, contentX + 10, y + 32);
                }

                /* 발표자 */
                c.textAlign = 'center';
                const midX = speakerX + COL3 / 2;
                if (p.speaker) {
                    c.font = `600 10px ${font}`;
                    c.fillStyle = '#1a1a2e';
                    c.fillText(p.speaker, midX, y + (p.role ? 18 : 28));
                    if (p.role) {
                        c.font = `400 9px ${font}`;
                        c.fillStyle = '#6b7280';
                        c.fillText(p.role, midX, y + 32);
                    }
                } else {
                    c.font = `400 10px ${font}`;
                    c.fillStyle = '#6b7280';
                    c.fillText('—', midX, y + 28);
                }
                y += rowH;
            });

            /* 테이블 외곽 테두리 */
            c.strokeStyle = '#e5e7eb';
            c.lineWidth = 1;
            c.strokeRect(PAD + 0.5, headerH + sectionH + 0.5, W - PAD * 2 - 1, tableHdrH + rows.length * rowH - 1);

            return cv;
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        function saveImage() {
            showToast('이미지 생성 중...');
            try {
                const cv = buildCanvas();
                const a = document.createElement('a');
                const title = (document.getElementById('mainTitle').value || '세미나포스터')
                    .replace(/\n/g, '_').replace(/\s+/g, '_');
                a.download = `${title}.png`;
                a.href = cv.toDataURL('image/png');
                a.click();
                showToast('이미지가 저장되었습니다 ✓');
            } catch (e) { showToast('저장 중 오류: ' + e.message); }
        }

        async function copyImage() {
            showToast('클립보드에 복사 중...');
            try {
                const cv = buildCanvas();
                cv.toBlob(async blob => {
                    try {
                        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                        showToast('클립보드에 복사되었습니다 ✓');
                    } catch {
                        /* 권한 거부 시 → 새 탭 열기 */
                        const url = URL.createObjectURL(blob);
                        const win = window.open('', '_blank');
                        win.document.write(`<body style="margin:0;background:#111">
            <p style="color:#aaa;font-family:sans-serif;padding:12px;font-size:13px">
              이미지를 우클릭 → [이미지 복사] 하세요</p>
            <img src="${url}" style="max-width:100%"></body>`);
                        showToast('새 탭에서 이미지를 우클릭해 복사하세요');
                    }
                }, 'image/png');
            } catch (e) { showToast('오류: ' + e.message); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._t);
            t._t = setTimeout(() => t.classList.remove('show'), 2400);
        }

        buildForm();
        generate();
    </script>
</body>
