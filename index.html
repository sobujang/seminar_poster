<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세미나 포스터 템플릿</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background: #f0f0f5;
            min-height: 100vh;
        }

        .app {
            display: flex;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ── 현재 작업 상태 ── */
        .status-bar {
            position: fixed;
            bottom: 20px;
            right: 24px;
            z-index: 1001;
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(8px);
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 11px;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .status-bar .dot {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }


        /* ── GitHub UI Elements ── */
        .top-tools {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 1001;
            display: flex;
            gap: 12px;
        }

        .btn-tool {
            background: #ffffff;
            color: #1a1a2e;
            border: 1px solid #e5e7eb;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-tool:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            border-color: #2d2de0;
        }

        .btn-tool.primary {
            background: #1a1a2e;
            color: #fff;
            border: none;
        }

        /* 모달 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: #fff;
            padding: 32px;
            border-radius: 20px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .modal h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .modal-field {
            margin-bottom: 16px;
        }

        .modal-field label {
            display: block;
            font-size: 11px;
            color: #6b7280;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
        }

        .modal input:focus {
            border-color: #2d2de0;
        }

        .modal .btn-group {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .modal .btn-group button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-save-conf {
            background: #2d2de0;
            color: #fff;
        }

        .btn-close-modal {
            background: #f3f4f6;
            color: #4b5563;
        }

        /* ── 컬러 변수 ── */
        :root {
            --point-color: #2d2de0;
            --point-dark: #1a1adc;
        }



        /* ── 왼쪽 편집 패널 ── */
        .editor {
            width: 340px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .editor-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid #e5e7eb;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .editor-header h2 {
            font-size: 15px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 2px;
        }

        .editor-header p {
            font-size: 11px;
            color: #6b7280;
        }

        .editor-body {
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .field-group h3 {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: #303090;
            margin-bottom: 10px;
        }

        .field {
            margin-bottom: 10px;
        }

        .field.inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .field.inline label {
            margin-bottom: 0;
        }

        .field.inline input[type="color"] {
            width: 44px;
            height: 28px;
            padding: 0;
            border: 1px solid #e5e7eb;
            cursor: pointer;
        }


        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 4px;
        }

        .field input,
        .field textarea {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 12px;
            color: #1a1a2e;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            resize: none;
        }

        .field input:focus,
        .field textarea:focus {
            border-color: #2d2de0;
        }

        /* 프로그램 행 */
        .program-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .program-row {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 10px;
        }

        .program-row-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .row-num {
            width: 20px;
            height: 20px;
            background: var(--point-color);
            color: #fff;
            border-radius: 50%;
            font-size: 10px;

            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .program-row-header span {
            font-size: 11px;
            font-weight: 600;
            color: #374151;
            flex: 1;
        }

        .btn-del-row {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            font-size: 15px;
            line-height: 1;
            padding: 0 2px;
            transition: color 0.15s;
        }

        .btn-del-row:hover {
            color: #ef4444;
        }

        .program-row input {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 5px;
            padding: 5px 8px;
            font-size: 11px;
            font-family: inherit;
            outline: none;
            background: #fff;
            margin-bottom: 5px;
        }

        .program-row input:last-child {
            margin-bottom: 0;
        }

        .program-row input:focus {
            border-color: #2d2de0;
        }

        .program-row input::placeholder {
            color: #9ca3af;
        }

        /* 추가 버튼 */
        .btn-preset {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px #e5e7eb;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-preset:hover {
            transform: scale(1.1);
        }

        .btn-add-row {
            width: 100%;
            background: #f0f0ff;
            border: 1.5px dashed var(--point-color);
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            font-weight: 500;
            color: var(--point-color);

            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }

        .btn-add-row:hover {
            background: #e0e0fa;
        }

        /* 하단 버튼 */
        .editor-footer {
            padding: 14px 20px;
            border-top: 1px solid #e5e7eb;
            background: #fff;
            position: sticky;
            bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .btn-generate {
            width: 100%;
            background: var(--point-color);
            color: #fff;
            border: none;
            border-radius: 8px;

            padding: 12px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-generate:hover {
            background: #1a1adc;
        }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }

        .btn-sub {
            background: #f5f6fa;
            color: #1a1a2e;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 9px 4px;
            font-size: 11px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .btn-sub:hover {
            background: #e8e8f5;
            border-color: #c0c0e0;
        }

        .btn-sub .icon {
            font-size: 15px;
        }

        .btn-sub .label {
            font-size: 10px;
            color: #6b7280;
        }

        /* 토스트 */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 9999;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 아카이브 드로어 관리 버튼 */
        .archive-item {
            position: relative;
        }

        .archive-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .archive-item:hover .archive-actions {
            opacity: 1;
        }

        .btn-action {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: #fff;
            color: #4b5563;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .btn-action:hover {
            color: #2d2de0;
            background: #f3f4f6;
        }

        .btn-action.del:hover {
            color: #ef4444;
        }

        /* 저장 모달 확장 */
        .save-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-save-opt {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            background: #fff;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-save-opt:hover {
            border-color: #2d2de0;
            background: #f9f9ff;
        }

        .btn-save-opt.primary {
            background: #2d2de0;
            color: #fff;
            border: none;
        }

        .btn-save-opt .icon {
            font-size: 18px;
        }

        .btn-save-opt .text h4 {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .btn-save-opt .text p {
            font-size: 11px;
            opacity: 0.8;
        }


        /* 아카이브 드로어 */
        .archive-drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            background: #fff;
            box-shadow: -15px 0 45px rgba(0, 0, 0, 0.08);
            z-index: 1002;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .archive-drawer.open {
            right: 0;
        }

        .archive-header {
            padding: 24px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .archive-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .archive-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .archive-item {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .archive-item:hover {
            border-color: #2d2de0;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(45, 45, 224, 0.08);
            transform: translateY(-2px);
        }

        .archive-item .date {
            display: inline-block;
            background: rgba(45, 45, 224, 0.1);
            color: #2d2de0;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .archive-item .title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            line-height: 1.4;
        }

        .archive-item .meta {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }


        /* ── 미리보기 ── */
        .preview {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 32px;
            overflow-y: auto;
        }

        /* ── 포스터 ── */
        .poster {
            width: 480px;
            background: #fff;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            user-select: none;
            --p-color: var(--point-color);
        }

        .poster-header {
            background: linear-gradient(135deg, var(--p-color) 0%, #1a1a2e 150%);
            padding: 28px 28px 24px;
            position: relative;
            overflow: hidden;
        }


        .poster-header::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            pointer-events: none;
        }

        .poster-header::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .p-org-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.95);
            font-size: 11px;
            font-weight: 500;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .p-event-label {
            font-size: 9.5px;
            letter-spacing: 3px;
            color: #a0a0ff;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .p-main-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            line-height: 1.25;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
            white-space: pre-line;
        }

        .p-subtitle {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.12);
            border-left: 3px solid rgba(255, 255, 255, 0.6);
            padding: 6px 10px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            display: inline-block;
        }

        .p-info-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            z-index: 1;
        }

        .p-info-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .p-info-label {
            font-size: 10px;
            font-weight: 600;
            color: #a0a0ff;
            min-width: 48px;
            padding-top: 1px;
            flex-shrink: 0;
        }

        .p-info-value {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.92);
            line-height: 1.5;
        }

        .p-divider {
            height: 1px;
            background: linear-gradient(to right, var(--p-color), transparent);
            opacity: 0.25;
            margin: 0 28px;
        }


        .p-program-section {
            padding: 20px 28px 28px;
        }

        .p-section-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--p-color);
            font-weight: 500;
            margin-bottom: 4px;
        }


        .p-section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .p-table {
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        .p-table-header {
            display: grid;
            grid-template-columns: 38px 1fr 90px;
            background: var(--p-color);
            padding: 8px 0;
        }


        .p-table-header span {
            font-size: 10px;
            font-weight: 500;
            color: #fff;
            text-align: center;
        }

        .p-table-header span:nth-child(2) {
            text-align: left;
            padding-left: 10px;
        }

        .p-table-body .p-row {
            display: grid;
            grid-template-columns: 38px 1fr 90px;
            border-top: 1px solid #e5e7eb;
            min-height: 48px;
            align-items: center;
        }

        .p-table-body .p-row:nth-child(odd) {
            background: #f9fafb;
        }

        .p-table-body .p-row:nth-child(even) {
            background: #fff;
        }

        .p-row-no {
            font-size: 12px;
            font-weight: 700;
            color: var(--p-color);
            text-align: center;
        }


        .p-row-content {
            padding: 8px 10px;
            border-left: 1px solid #e5e7eb;
            border-right: 1px solid #e5e7eb;
        }

        .p-row-content strong {
            display: block;
            font-size: 11px;
            color: #1a1a2e;
            margin-bottom: 2px;
            white-space: pre-line;
        }


        .p-row-content span {
            font-size: 9.5px;
            color: #6b7280;
            white-space: pre-line;
            display: block;
        }


        .p-row-speaker {
            padding: 8px;
            text-align: center;
            white-space: pre-line;
            line-height: 1.4;
        }

        .p-row-speaker strong {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #1a1a2e;
        }

        .p-row-speaker span {
            display: block;
            font-size: 9px;
            color: #6b7280;
        }

        /* 텍스트영역 통일 */
        .field textarea,
        .program-row textarea {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 11px;
            color: #1a1a2e;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            resize: vertical;
            min-height: 34px;
        }

        .program-row textarea {
            border-radius: 5px;
            padding: 5px 8px;
            margin-bottom: 5px;
        }

        .program-row textarea:last-child {
            margin-bottom: 0;
        }

        @media print {
            .editor {
                display: none;
            }

            .preview {
                padding: 0;
            }

            .poster {
                box-shadow: none;
                border-radius: 0;
            }

            body {
                background: white;
            }
        }
    </style>
</head>

<body>
    <div class="app">

        <div class="editor">
            <div class="editor-header">
                <h2>포스터 내용 편집</h2>
                <p>수정 후 포스터 생성 버튼을 눌러주세요</p>
            </div>
            <div class="editor-body">

                <div class="field-group">
                    <h3>DESIGN THEME</h3>
                    <div class="control-group">
                        <label>DESIGN THEME</label>
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                            <input type="color" id="pointColor" value="#2d2de0" onchange="updateTheme()"
                                style="width:44px; height:44px; padding:2px;">
                            <span style="font-size:12px; color:#6b7280;">포인트 컬러 선택</span>
                        </div>
                        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:15px;">
                            <button class="btn-preset" onclick="setPreset('#1e40af')"
                                style="background:#1e40af"></button>
                            <button class="btn-preset" onclick="setPreset('#7c3aed')"
                                style="background:#7c3aed"></button>
                            <button class="btn-preset" onclick="setPreset('#db2777')"

    <script>
        let programs = [
            { content: '소부장기술융합포럼 / 연구조합 총회', sub: '정기총회 진행', speaker: '', role: '' },
            { content: '반도체 후공정 설비 동향 및 전망', sub: 'Semiconductor back-end process equipment trend', speaker: '최용원', role: '부사장' },
            { content: '특허 소송 사례 설명', sub: 'Patent litigation case review', speaker: '김철진 변리사', role: '윌비에스엔티' },
            { content: '서버 해킹 보안 대책', sub: 'Server hacking security countermeasures', speaker: '박춘식', role: '보안안전 전문가' },
            { content: '공장 견학', sub: '티로보틱스 시설 투어', speaker: '', role: '' },
        ];

        let infoItems = [
            { label: '일시', value: '2026년 4월 13일(월) 오후 5시' },
            { label: '장소', value: '티로보틱스 (경기도 오산시 가장산업서북로 103-37)' }
        ];

        function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

        function buildInfoForm() {
            const wrap = document.getElementById('infoItems');
            wrap.innerHTML = '';
            infoItems.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'info-item-row';
                div.style.display = 'flex';
                div.style.gap = '6px';
                div.style.marginBottom = '8px';
                div.style.alignItems = 'flex-start';
                div.innerHTML = `
                    <div style="flex: 0 0 70px;">
                        <input type="text" id="infoL_${i}" placeholder="항목명" value="${esc(item.label)}" style="width:100%; border:1px solid #e5e7eb; border-radius:5px; padding:5px 8px; font-size:11px;">
                    </div>
                    <div style="flex: 1;">
                        <input type="text" id="infoV_${i}" placeholder="내용" value="${esc(item.value)}" style="width:100%; border:1px solid #e5e7eb; border-radius:5px; padding:5px 8px; font-size:11px;">
                    </div>
                    <div style="display:flex; gap:2px;">
                        <button class="btn-del-row" onclick="moveInfoItem(${i}, -1)" title="위로">↑</button>
                        <button class="btn-del-row" onclick="moveInfoItem(${i}, 1)" title="아래로">↓</button>
                        <button class="btn-del-row" onclick="deleteInfoItem(${i})" title="삭제">✕</button>
                    </div>
                `;
                wrap.appendChild(div);
            });
        }

        function addInfoItem() {
            infoItems = collectInfoItems();
            infoItems.push({ label: '', value: '' });
            buildInfoForm();
        }

        function deleteInfoItem(i) {
            infoItems = collectInfoItems();
            infoItems.splice(i, 1);
            buildInfoForm();
        }

        function moveInfoItem(i, dir) {
            infoItems = collectInfoItems();
            const target = i + dir;
            if (target < 0 || target >= infoItems.length) return;
            [infoItems[i], infoItems[target]] = [infoItems[target], infoItems[i]];
            buildInfoForm();
        }

        function collectInfoItems() {
            return infoItems.map((_, i) => ({
                label: document.getElementById(`infoL_${i}`)?.value.trim() || '',
                value: document.getElementById(`infoV_${i}`)?.value.trim() || '',
            }));
        }

        function buildForm() {
            const wrap = document.getElementById('programRows');
            wrap.innerHTML = '';
            programs.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'program-row';
                div.innerHTML = `
        <div class="program-row-header">
          <div class="row-num">${i + 1}</div>
          <span>프로그램 ${i + 1}</span>
          <div style="display:flex; gap:2px;">
            <button class="btn-del-row" onclick="moveProgramRow(${i}, -1)" title="위로">↑</button>
            <button class="btn-del-row" onclick="moveProgramRow(${i}, 1)" title="아래로">↓</button>
            <button class="btn-del-row" onclick="deleteRow(${i})" title="삭제">✕</button>
          </div>
        </div>
        <textarea id="p${i}_content" placeholder="내용 *"           style="margin-bottom:5px;">${esc(p.content)}</textarea>
        <textarea id="p${i}_sub"     placeholder="부가 설명 (여러 줄 가능)" style="margin-bottom:5px;">${esc(p.sub)}</textarea>
        <textarea id="p${i}_speaker" placeholder="발표자 (선택, 여러명 가능)" rows="1">${esc(p.speaker)}</textarea>


        <textarea id="p${i}_role"    placeholder="소속/직함 (선택)"          rows="1">${esc(p.role)}</textarea>
      `;
                wrap.appendChild(div);
            });
        }

        function addRow() {
            programs = collectPrograms(); // 현재 입력된 내용들을 먼저 저장 (중복 유실 방지)
            programs.push({ content: '', sub: '', speaker: '', role: '' });
            buildForm();
            // 새 행으로 스크롤
            setTimeout(() => {
                const rows = document.querySelectorAll('.program-row');
                if (rows.length > 0) {
                    rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 10);
        }

        function deleteRow(i) {
            if (programs.length <= 1) { showToast('최소 1개 이상 필요합니다'); return; }
            programs = collectPrograms(); // 현재 입력된 내용들을 저장
            programs.splice(i, 1);
            buildForm();
        }

        function moveProgramRow(i, dir) {
            programs = collectPrograms();
            const target = i + dir;
            if (target < 0 || target >= programs.length) return;
            [programs[i], programs[target]] = [programs[target], programs[i]];
            buildForm();
        }

        function collectPrograms() {
            return programs.map((_, i) => ({
                content: document.getElementById(`p${i}_content`)?.value.trim() || '',
                sub: document.getElementById(`p${i}_sub`)?.value.trim() || '',
                speaker: document.getElementById(`p${i}_speaker`)?.value.trim() || '',
                role: document.getElementById(`p${i}_role`)?.value.trim() || '',
            }));
        }

        function setPreset(color) {
            document.getElementById('pointColor').value = color;
            updateTheme();
        }

        function generate() {
            const org = document.getElementById('org').value;
            const eventLabel = document.getElementById('eventLabel').value;
            const mainTitle = document.getElementById('mainTitle').value;
            const subtitle = document.getElementById('subtitle').value;
            const infos = collectInfoItems();

            const h1 = document.getElementById('h_no').value || 'No';
            const h2 = document.getElementById('h_content').value || '내용';
            const h3 = document.getElementById('h_speaker').value || '발표자';

            let infoHTML = '';

            infos.forEach(item => {
                if (!item.label && !item.value) return;
                infoHTML += `<div class="p-info-item"><span class="p-info-label">${esc(item.label)}</span><span class="p-info-value">${esc(item.value)}</span></div>`;
            });

            let rowsHTML = '';
            collectPrograms().forEach((p, i) => {
                const speakerHTML = p.speaker ? `<strong>${esc(p.speaker)}</strong>` : '';
                const roleHTML = p.role ? `<span>${esc(p.role)}</span>` : (!p.speaker ? '<span>—</span>' : '');

                rowsHTML += `
        <div class="p-row">
          <div class="p-row-no">${i + 1}</div>
          <div class="p-row-content">
            <strong>${esc(p.content).replace(/\n/g, '<br>') || '—'}</strong>
            ${p.sub ? `<span>${esc(p.sub).replace(/\n/g, '<br>')}</span>` : ''}
          </div>
          <div class="p-row-speaker">${speakerHTML}${roleHTML}</div>
        </div>`;
            });

            document.getElementById('poster').innerHTML = `
      <div class="poster-header">
        ${document.getElementById('useQR').checked ?
                    `<img class="p-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(document.getElementById('qrData').value || window.location.href)}" 
                style="position:absolute; top:28px; right:28px; width:52px; height:52px; padding:4px; background:rgba(255,255,255,0.9); border-radius:4px;">` : ''
                }
        <div class="p-org-tag">${org}</div>

        <div class="p-event-label">${eventLabel}</div>
        <div class="p-main-title">${mainTitle}</div>
        <div class="p-subtitle">${subtitle}</div>
        <div class="p-info-row">
          ${infoHTML}
        </div>
      </div>
      <div class="p-divider"></div>
      <div class="p-program-section">
        <div class="p-section-label">PROGRAM</div>
        <div class="p-section-title">세부 프로그램</div>
        <div class="p-table">
          <div class="p-table-header">
            <span style="text-align:center;">${esc(h1)}</span>
            <span style="text-align:center;">${esc(h2)}</span>
            <span style="text-align:center;">${esc(h3)}</span>
          </div>
          <div class="p-table-body">${rowsHTML}</div>
        </div>
      </div>`;

            showToast('포스터가 생성되었습니다 ✓');
        }

        function updateTheme() {
            const color = document.getElementById('pointColor').value;
            document.documentElement.style.setProperty('--point-color', color);
            generate();
        }

        function wrapText(ctx, text, maxWidth) {
            if (!text) return [];
            const paragraphs = text.split('\n');
            const lines = [];
            paragraphs.forEach(p => {
                const chars = p.split('');
                let currentLine = '';
                for (let i = 0; i < chars.length; i++) {
                    let testLine = currentLine + chars[i];
                    if (ctx.measureText(testLine).width > maxWidth && i > 0) {
                        lines.push(currentLine);
                        currentLine = chars[i];
                    } else {
                        currentLine = testLine;
                    }
                }
                lines.push(currentLine);
            });
            return lines;
        }

        /* ── Canvas 직접 렌더링 ── */
        async function buildCanvas() {
            const pointColor = document.getElementById('pointColor').value;

            const S = 2; // 해상도 배율
            const W = 480, PAD = 28;
            const font = "'Apple SD Gothic Neo','Noto Sans KR',sans-serif";

            const org = document.getElementById('org').value;
            const eventLabel = document.getElementById('eventLabel').value;
            const mainTitle = document.getElementById('mainTitle').value;
            const subtitle = document.getElementById('subtitle').value;
            const infos = collectInfoItems().filter(it => it.label || it.value);
            const rows = collectPrograms();

            const h1 = document.getElementById('h_no').value || 'No';
            const h2 = document.getElementById('h_content').value || '내용';
            const h3 = document.getElementById('h_speaker').value || '발표자';

            // 너비 사전 정의

            const COL1 = 40, COL3 = 90;
            const contentX = PAD + COL1;
            const contentMaxWidth = W - PAD - COL3 - contentX - 25; // 여유 공간 확보

            // 행별 높이 및 텍스트 블록 정보 사전 계산
            const cv_dummy = document.createElement('canvas');
            const c_dummy = cv_dummy.getContext('2d');
            c_dummy.font = `700 12.5px ${font}`;

            const rowData = rows.map(p => {
                const sLines = (p.speaker || '').split('\n').filter(l => l.trim());
                const rLines = (p.role || '').split('\n').filter(l => l.trim());

                // 줄바꿈 대응 wrapText 적용
                const cLines = wrapText(c_dummy, p.content, contentMaxWidth);
                c_dummy.font = `500 10.5px ${font}`;
                const subLines = wrapText(c_dummy, p.sub, contentMaxWidth);
                c_dummy.font = `700 12.5px ${font}`; // 리셋

                // 디자인 비율 조정 (행간 확보)
                const speakerBlockH = sLines.length * 15 + rLines.length * 13 + (sLines.length && rLines.length ? 5 : 0);
                const mainBlockH = (cLines.length * 17) + (subLines.length > 0 ? 10 + subLines.length * 14 : 0);

                const h = Math.max(60, speakerBlockH + 28, mainBlockH + 32);
                return { h, sLines, rLines, cLines, subLines, speakerBlockH, mainBlockH };
            });

            const tableBodyH = rowData.reduce((a, b) => a + b.h, 0);

            // 1. 헤더 높이 계산
            let currY = PAD;
            currY += 40;
            currY += 18;
            const titleLines = mainTitle.split('\n');
            currY += titleLines.length * 34 + 8;
            currY += 44;
            currY += infos.length * 18;

            const headerH = currY + 28;
            const dividerH = 1;
            const sectionH = 70; // 충분히 확보
            const tableHdrH = 36;
            const bottomPad = 50; // QR 들어갈 공간 확보
            const H = headerH + dividerH + sectionH + tableHdrH + tableBodyH + bottomPad;

            const cv = document.createElement('canvas');
            cv.width = W * S;
            cv.height = H * S;
            const c = cv.getContext('2d');
            c.scale(S, S);

            /* ── 헤더 배경 ── */
            const hg = c.createLinearGradient(0, 0, W, headerH);
            hg.addColorStop(0, pointColor);
            hg.addColorStop(0.85, '#1a1a2e');
            c.fillStyle = hg;
            c.fillRect(0, 0, W, headerH);

            /* 장식 원 */
            circle(c, W + 10, -20, 120, 0.05);
            circle(c, 30, headerH - 10, 70, 0.04);

            function circle(ctx, cx, cy, r, alpha) {
                ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }

            let y = PAD;

            /* 기관 태그 */
            c.font = `600 11.5px ${font}`;
            const orgW = c.measureText(org).width + 26;
            c.fillStyle = 'rgba(255,255,255,0.18)';
            roundRect(c, PAD, y, orgW, 25, 12.5);
            c.fillStyle = '#fff';
            c.textBaseline = 'middle'; c.textAlign = 'left';
            c.fillText(org, PAD + 13, y + 13);
            y += 40;

            /* 이벤트 레이블 */
            c.font = `600 9.5px ${font}`;
            c.fillStyle = 'rgba(255,255,255,0.55)';
            c.letterSpacing = '2px';
            c.fillText(eventLabel.toUpperCase(), PAD, y);
            c.letterSpacing = '0px';
            y += 18;

            /* 메인 타이틀 */
            c.font = `800 30px ${font}`;
            c.fillStyle = '#fff';
            titleLines.forEach(line => { c.fillText(line, PAD, y + 15); y += 34; });
            y += 8;

            /* 부제목 강조 박스 */
            c.font = `600 14px ${font}`;
            const boxW = Math.min(c.measureText(subtitle).width + 28, W - PAD * 2);
            c.fillStyle = 'rgba(255,255,255,0.12)';
            c.fillRect(PAD, y, boxW, 32);
            c.fillStyle = '#fff';
            c.fillRect(PAD, y, 3.5, 32);
            c.fillText(subtitle, PAD + 14, y + 16.5);
            y += 44;

            /* 정보 항목 리스트 */
            infos.forEach(item => {
                c.font = `700 10.5px ${font}`;
                c.fillStyle = 'rgba(255,255,255,0.5)';
                c.fillText(item.label, PAD, y + 1);
                c.font = `500 11.5px ${font}`;
                c.fillStyle = 'rgba(255,255,255,0.95)';
                c.fillText(item.value, PAD + 54, y + 1);
                y += 18;
            });

            /* ── 하단 본문 ── */
            c.fillStyle = '#f8f9fd';
            c.fillRect(0, headerH, W, H - headerH);

            y = headerH + 30;
            c.font = `800 10.5px ${font}`;
            c.fillStyle = pointColor;
            c.fillText('PROGRAM', PAD, y); y += 20;
            c.font = `800 20px ${font}`;
            c.fillStyle = '#1a1a2e';
            c.fillText('세부 프로그램', PAD, y); y += 22;

            /* 테이블 헤더 */
            c.fillStyle = pointColor;
            roundRect(c, PAD, y, W - PAD * 2, tableHdrH, 6);
            c.font = `700 12px ${font}`;
            c.fillStyle = '#fff';
            c.textAlign = 'center';
            c.fillText(h1, PAD + 20, y + tableHdrH / 2 + 0.5);

            // 중앙 정렬 (가운데 컬럼 너비 계산)
            const midContentX = contentX + (W - PAD - COL3 - contentX) / 2;
            c.fillText(h2, midContentX, y + tableHdrH / 2 + 0.5);
            c.fillText(h3, W - PAD - 45, y + tableHdrH / 2 + 0.5);
            y += tableHdrH;

            /* 테이블 본문 행 반복 */
            const speakerX = W - PAD - COL3;

            rows.forEach((p, i) => {
                const { h, sLines, rLines, cLines, subLines, speakerBlockH, mainBlockH } = rowData[i];
                c.fillStyle = i % 2 === 0 ? '#fff' : '#f9fbff';
                c.fillRect(PAD, y, W - PAD * 2, h);

                // 내부 구분선 (디자인 보강: 첫번째 행 라인 제거)
                c.fillStyle = '#eff1f7';
                if (i > 0) c.fillRect(PAD, y, W - PAD * 2, 1);
                c.fillRect(contentX, y, 1, h);
                c.fillRect(speakerX, y, 1, h);

                /* 행 번호 */
                c.font = `800 14px ${font}`;
                c.fillStyle = pointColor;
                c.textAlign = 'center';
                c.fillText(i + 1, PAD + COL1 / 2, y + h / 2 + 1);

                /* 프로그램 내용 (수직 중앙 정렬 + 향상된 행간) */
                const contentStartPadding = (h - mainBlockH) / 2;
                let textY = y + contentStartPadding + 12;

                c.textAlign = 'left';
                c.font = `700 13px ${font}`;
                c.fillStyle = '#1a1a2e';
                cLines.forEach(line => {
                    c.fillText(line, contentX + 16, textY);
                    textY += 17;
                });

                if (subLines.length > 0) {
                    textY += 6;
                    c.font = `500 11px ${font}`;
                    c.fillStyle = '#6b7280';
                    subLines.forEach(line => {
                        c.fillText(line, contentX + 16, textY);
                        textY += 14;
                    });
                }

                /* 발표자 정보 */
                const speakerStartPadding = (h - speakerBlockH) / 2;
                let spY = y + speakerStartPadding + 11;
                c.textAlign = 'center';
                const midX = speakerX + COL3 / 2;

                if (sLines.length > 0) {
                    c.font = `700 12px ${font}`;
                    c.fillStyle = '#1a1a2e';
                    sLines.forEach(line => {
                        c.fillText(line, midX, spY);
                        spY += 15;
                    });
                } else if (rLines.length === 0) {
                    c.font = `400 11px ${font}`;
                    c.fillStyle = '#9ca3af';
                    c.fillText('—', midX, y + h / 2 + 1);
                }

                if (rLines.length > 0) {
                    if (sLines.length > 0) spY += 3;
                    c.font = `400 11px ${font}`;
                    c.fillStyle = '#7a7f8b';
                    rLines.forEach(line => {
                        c.fillText(line, midX, spY);
                        spY += 14;
                    });
                }

                y += h;
            });

            // 전체 테두리 마무리
            c.strokeStyle = '#eef0f5';
            c.lineWidth = 1;
            c.strokeRect(PAD, headerH + dividerH, W - PAD * 2, H - headerH - dividerH - 20);

            // [Designer Bonus] QR Code 처리
            if (document.getElementById('useQR').checked) {
                const qrVal = document.getElementById('qrData').value || window.location.href;
                const qrImg = new Image();
                qrImg.crossOrigin = "anonymous";
                qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrVal)}`;

                // 이미지 로드 대기
                await new Promise((resolve) => {
                    qrImg.onload = resolve;
                    qrImg.onerror = resolve; // 에러 시에도 진행
                });

                c.fillStyle = '#fff';
                c.fillRect(W - PAD - 52, PAD, 52, 52);
                c.drawImage(qrImg, W - PAD - 50, PAD + 2, 48, 48);
            }


            // 더 풍성한 하단 텍스트
            c.textAlign = 'left';
            c.font = `500 9px ${font}`;
            c.fillStyle = '#94a3b8';
            c.fillText(`Generated by Seminar Poster Master • ${new Date().toLocaleDateString()}`, PAD, H - 22);

            return cv;
        }


        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        async function saveImage() {
            showToast('이미지 생성 중...');
            try {
                const cv = await buildCanvas();
                const a = document.createElement('a');
                const title = (document.getElementById('mainTitle').value || '세미나포스터')
                    .replace(/\n/g, '_').replace(/\s+/g, '_');
                a.download = `${title}.png`;
                a.href = cv.toDataURL('image/png');
                a.click();
                showToast('이미지가 저장되었습니다 ✓');
            } catch (e) { showToast('저장 중 오류: ' + e.message); }
        }

        async function copyImage() {
            showToast('클립보드에 복사 중...');
            try {
                const cv = await buildCanvas();
                cv.toBlob(async blob => {
                    if (!blob) return;
                    try {
                        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                        showToast('클립보드에 복사되었습니다 ✓');
                    } catch {
                        const url = URL.createObjectURL(blob);
                        const win = window.open('', '_blank');
                        win.document.write(`<body style="margin:0;background:#111">
            <p style="color:#aaa;font-family:sans-serif;padding:12px;font-size:13px">
              이미지를 우클릭 → [이미지 복사] 하세요</p>
            <img src="${url}" style="max-width:100%"></body>`);
                        showToast('새 탭에서 이미지를 우클릭해 복사하세요');
                    }
                }, 'image/png');
            } catch (e) { showToast('오류: ' + e.message); }
        }


        /* ── 공유 기능 ── */
        function shareLink() {
            try {
                const data = {
                    org: document.getElementById('org').value,
                    eventLabel: document.getElementById('eventLabel').value,
                    mainTitle: document.getElementById('mainTitle').value,
                    subtitle: document.getElementById('subtitle').value,
                    infoItems: collectInfoItems(),
                    programs: collectPrograms()
                };
                const json = JSON.stringify(data);
                const hash = btoa(encodeURIComponent(json));
                const url = window.location.origin + window.location.pathname + '#' + hash;

                navigator.clipboard.writeText(url).then(() => {
                    showToast('공유 링크가 클립보드에 복사되었습니다 ✓');
                }).catch(() => {
                    prompt('아래 링크를 복사하여 공유하세요:', url);
                });
            } catch (e) { showToast('공유 실패: ' + e.message); }
        }


        /* ── GitHub API Logic ── */
        let ghData = JSON.parse(localStorage.getItem('ghArchiveConfig') || '{}');
        let currentEditingPath = null;
        let currentEditingSha = null;

        function openConfig() {
            document.getElementById('ghOwner').value = ghData.owner || '';
            document.getElementById('ghRepo').value = ghData.repo || '';
            document.getElementById('ghToken').value = ghData.token || '';
            document.getElementById('configModal').style.display = 'flex';
        }

        function closeConfig() { document.getElementById('configModal').style.display = 'none'; }

        function openSaveModal() {
            const fileNameInput = document.getElementById('saveFileName');
            if (!fileNameInput.value) {
                const date = new Date().toISOString().slice(0, 10).replace(/-/g, '_');
                const title = (document.getElementById('mainTitle').value || '').split('\n')[0].replace(/[^가-힣a-zA-Z0-9]/g, '_');
                fileNameInput.value = `${date}_${title}`;
            }

            const btnOverwrite = document.getElementById('btnSaveOverwrite');
            if (currentEditingPath) {
                btnOverwrite.style.display = 'flex';
                document.getElementById('overwritePathLabel').textContent = `${currentEditingPath.split('/').pop().replace('.json', '')} 파일에 수정사항을 반영합니다.`;
            } else {
                btnOverwrite.style.display = 'none';
            }

            document.getElementById('saveModal').style.display = 'flex';
        }

        function closeSaveModal() { document.getElementById('saveModal').style.display = 'none'; }

        function saveConfig() {
            ghData = {
                owner: document.getElementById('ghOwner').value.trim(),
                repo: document.getElementById('ghRepo').value.trim(),
                token: document.getElementById('ghToken').value.trim()
            };
            localStorage.setItem('ghArchiveConfig', JSON.stringify(ghData));
            showToast('연동 설정이 저장되었습니다.');
            closeConfig();
        }

        async function fetchGH(path, method = 'GET', body = null) {
            if (!ghData.token || !ghData.owner || !ghData.repo) {
                openConfig();
                throw new Error('GitHub 설정을 먼저 완료해주세요.');
            }
            const headers = {
                'Authorization': `token ${ghData.token}`,
                'Accept': 'application/vnd.github.v3+json'
            };
            const res = await fetch(`https://api.github.com/repos/${ghData.owner}/${ghData.repo}${path}`, {
                method, headers, body: body ? JSON.stringify(body) : null,
                cache: 'no-store' // 브라우저 캐시 방지
            });


            if (res.status === 404 && (method === 'GET' || method === 'DELETE')) return null;
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.message || 'API 통신 오류');
            }
            return res.json();
        }

        async function doSave(overwrite = false) {
            const fileName = document.getElementById('saveFileName').value.trim();
            if (!fileName) { showToast('파일 이름을 입력해주세요.'); return; }

            const path = overwrite ? currentEditingPath : `posters/${fileName}.json`;
            const data = {
                org: document.getElementById('org').value,
                pointColor: document.getElementById('pointColor').value,
                eventLabel: document.getElementById('eventLabel').value,
                mainTitle: document.getElementById('mainTitle').value,
                subtitle: document.getElementById('subtitle').value,
                infoItems: collectInfoItems(),
                tableHeaders: [
                    document.getElementById('h_no').value,
                    document.getElementById('h_content').value,
                    document.getElementById('h_speaker').value
                ],
                useQR: document.getElementById('useQR').checked,
                qrData: document.getElementById('qrData').value,
                programs: collectPrograms(),
                savedAt: new Date().toISOString()
            };

            showToast('GitHub 아카이브 저장 중...');
            try {
                let sha = overwrite ? currentEditingSha : undefined;
                if (!overwrite) {
                    const existing = await fetchGH(`/contents/${path}`);
                    if (existing) {
                        if (!confirm(`같은 이름의 파일이 이미 존재합니다. 덮어쓰시겠습니까?`)) return;
                        sha = existing.sha;
                    }
                }

                const body = {
                    message: `Archive: ${fileName}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                    sha: sha
                };

                const res = await fetchGH(`/contents/${path}`, 'PUT', body);
                currentEditingPath = path;
                currentEditingSha = res.content.sha;
                updateStatusUI();

                showToast('성공적으로 저장되었습니다! ✓');
                closeSaveModal();
                if (document.getElementById('archiveDrawer').classList.contains('open')) loadHistory();
            } catch (e) {
                showToast('저장 실패: ' + e.message);
            }
        }

        async function loadHistory() {
            const wrap = document.getElementById('archiveList');
            wrap.innerHTML = '<p style="text-align:center; padding:40px; font-size:12px; color:#9ca3af;">목록을 불러오는 중...</p>';

            try {
                // 캐시 방지를 위해 타임스템프 추가
                const files = await fetchGH('/contents/posters?t=' + Date.now());

                if (!files || files.length === 0) {
                    wrap.innerHTML = '<p style="text-align:center; padding:40px; font-size:12px; color:#9ca3af;">보관된 포스터가 없습니다.</p>';
                    return;
                }

                const jsonFiles = files.filter(f => f.name.endsWith('.json')).reverse();
                wrap.innerHTML = jsonFiles.map((f) => `
                    <div class="archive-item">
                        <div onclick="loadArchivedPoster('${f.path}')" style="flex:1;">
                            <div class="date">DATA</div>
                            <div class="title">${esc(f.name.replace('.json', ''))}</div>
                            <div class="meta">탭하여 불러오기</div>
                        </div>
                        <div class="archive-actions">
                            <button class="btn-action" onclick="askRename('${f.path}')" title="이름 수정">✏️</button>
                            <button class="btn-action del" onclick="askDelete('${f.path}', '${f.sha}')" title="삭제">🗑️</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                wrap.innerHTML = `<p style="color:#ef4444; font-size:12px; text-align:center; padding:20px;">${e.message}</p>`;
            }
        }

        async function askDelete(path, sha) {
            if (!confirm(`정말로 이 포스터 데이터를 삭제하시겠습니까?\n(${path})`)) return;
            try {
                showToast('삭제 중...');
                await fetchGH(`/contents/${path}`, 'DELETE', {
                    message: `Delete archive: ${path}`,
                    sha: sha
                });
                showToast('삭제되었습니다.');
                if (currentEditingPath === path) resetEditingStatus();
                loadHistory();
            } catch (e) {
                showToast('삭제 실패: ' + e.message);
            }
        }

        async function askRename(path) {
            const oldName = path.split('/').pop().replace('.json', '');
            const newName = prompt('새 파일 이름을 입력하세요:', oldName);
            if (!newName || newName === oldName) return;

            try {
                showToast('이름 변경 중...');
                const file = await fetchGH(`/contents/${path}`);
                const newPath = `posters/${newName}.json`;
                await fetchGH(`/contents/${newPath}`, 'PUT', {
                    message: `Rename from ${oldName} to ${newName}`,
                    content: file.content
                });
                await fetchGH(`/contents/${path}`, 'DELETE', {
                    message: `Remove old file after rename`,
                    sha: file.sha
                });

                showToast('이름이 변경되었습니다.');
                if (currentEditingPath === path) {
                    currentEditingPath = newPath;
                    updateStatusUI();
                }
                loadHistory();
            } catch (e) {
                showToast('변경 실패: ' + e.message);
            }
        }

        async function loadArchivedPoster(path) {
            try {
                showToast('원격 데이터 로드 중...');
                const file = await fetchGH(`/contents/${path}`);
                const data = JSON.parse(decodeURIComponent(escape(atob(file.content))));

                currentEditingPath = path;
                currentEditingSha = file.sha;
                document.getElementById('saveFileName').value = path.split('/').pop().replace('.json', '');
                updateStatusUI();

                // 적용
                document.getElementById('org').value = data.org || '';
                if (data.pointColor) {
                    document.getElementById('pointColor').value = data.pointColor;
                    document.documentElement.style.setProperty('--point-color', data.pointColor);
                }
                document.getElementById('eventLabel').value = data.eventLabel || '';

                document.getElementById('mainTitle').value = data.mainTitle || '';
                document.getElementById('subtitle').value = data.subtitle || '';
                if (data.infoItems) { infoItems = data.infoItems; buildInfoForm(); }
                if (data.programs) { programs = data.programs; buildForm(); }

                if (data.tableHeaders) {
                    document.getElementById('h_no').value = data.tableHeaders[0];
                    document.getElementById('h_content').value = data.tableHeaders[1];
                    document.getElementById('h_speaker').value = data.tableHeaders[2];
                }

                if (data.useQR !== undefined) {
                    document.getElementById('useQR').checked = data.useQR;
                }
                if (data.qrData !== undefined) {
                    document.getElementById('qrData').value = data.qrData;
                }

                generate();

                toggleArchive();
                showToast('포스터 데이터가 복구되었습니다 ✓');
            } catch (e) {
                showToast('불러오기 오류: ' + e.message);
            }
        }

        function updateStatusUI() {
            const bar = document.getElementById('statusBar');
            const text = document.getElementById('currentStatusText');
            if (currentEditingPath) {
                bar.style.display = 'flex';
                text.textContent = `편집 중: ${currentEditingPath.split('/').pop().replace('.json', '')}`;
            } else {
                bar.style.display = 'none';
            }
        }

        function resetEditingStatus() {
            currentEditingPath = null;
            currentEditingSha = null;
            updateStatusUI();
        }

        function toggleArchive() {
            const d = document.getElementById('archiveDrawer');
            const isOpen = d.classList.toggle('open');
            if (isOpen) loadHistory();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            clearTimeout(t._t);
            t._t = setTimeout(() => t.classList.remove('show'), 2400);
        }

        loadFromHash();
        buildInfoForm();
        buildForm();
        generate();
    </script>


</body>
